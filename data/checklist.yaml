# Minimum Viable Civilization Checklist
# Tier-based progression from stone age to semiconductors
# Schema: bootciv-checklist-v1
# IDs use dotted hierarchical format: domain.capability.process

_schema_docs:
  version: bootciv-checklist-v1
  description: >
    Checklist of milestones for bootstrapping industrial civilization.
    Items use dotted hierarchical IDs (domain.capability.process) matching
    the ontology in nodes.json. The domain field is the top-level segment
    of the ID, provided as a convenience for filtering.
  id_format: >
    Dot-separated hierarchy. Depth = number of segments.
    1 segment = domain, 2 = capability, 3 = process.
    Example: foundations.fire-making
  fields:
    id: "Dotted hierarchical identifier (matches node IDs in nodes.json)"
    name: "Human-readable description of the milestone"
    domain: "Top-level domain (first segment of id, for convenience)"

tier_0_survival:
  timeline: "Years 0-5"
  items:
    - id: foundations.fire-making
      name: "Fire-making (friction, later flint-and-steel)"
      domain: foundations

    - id: foundations.charcoal-production
      name: "Charcoal production (controlled pyrolysis)"
      domain: foundations

    - id: pottery.kilns
      name: "Pottery and kilns"
      domain: pottery

tier_1_industrial:
  timeline: "Years 5-20"
  items:
    - id: metallurgy.copper-bronze
      name: "Copper smelting and bronze alloying"
      domain: metallurgy

    - id: metallurgy.iron-steel
      name: "Iron smelting to wrought iron to steel"
      domain: metallurgy

    - id: steam.power
      name: "Steam power developed"
      domain: steam

tier_2_semiconductor:
  timeline: "Years 15-40"
  items:
    - id: silicon.mg-silicon
      name: "Metallurgical-grade silicon produced"
      domain: silicon

    - id: silicon.crystal-growth
      name: "Czochralski crystal growth producing ingots"
      domain: silicon

    - id: glass.fused-silica
      name: "Fused silica and borosilicate glass production"
      domain: glass

tier_3_advanced:
  timeline: "Years 30-100+"
  items:
    - id: semiconductor.fabrication.photolithography
      name: "Photolithography capability"
      domain: semiconductor

    - id: semiconductor.fabrication.first-ics
      name: "First integrated circuits (SSI/MSI)"
      domain: semiconductor

    - id: semiconductor.design.vlsi-scaling
      name: "VLSI scaling in progress"
      domain: semiconductor
