_schema_docs:
  version: bootciv-checklist-v1
  description: 'Checklist of milestones for bootstrapping industrial civilization. Items use dotted hierarchical IDs (domain.capability.process) matching the ontology in nodes.json. The domain field is
    the top-level segment of the ID, provided as a convenience for filtering.

    '
  id_format: 'Dot-separated hierarchy. Depth = number of segments. 1 segment = domain, 2 = capability, 3 = process. Example: foundations.fire-making

    '
  fields:
    id: Dotted hierarchical identifier (matches node IDs in nodes.json)
    name: Human-readable description of the milestone
    domain: Top-level domain (first segment of id, for convenience)
    metrics: Quantitative milestone criteria (optional)
tier_0_survival:
  timeline: Years 0-5
  items:
  - id: foundations.fire
    name: 'Fire-making and charcoal production (combined: friction/flint ignition + controlled pyrolysis)'
    domain: foundations
    metrics: 'Produce 10+ kg charcoal per batch from earth-covered pit kiln; sustain fire continuously for 8+ hours'
  - id: foundations.tools-basic
    name: Basic stone and wood tools
    domain: foundations
    metrics: 'Produce 5+ functional stone tool types (scraper, axe, drill, chisel, knife); achieve cutting edge <1 mm radius'
  - id: foundations.food-agriculture
    name: Agriculture surplus and animal domestication for labor
    domain: foundations
    metrics: 'Yield 2 tonnes grain per hectare; maintain 6-month food reserve for settlement of 50+ people'
  - id: plants.edible-plants
    name: Cultivation of edible plants for food security
    domain: plants
  - id: plants.medicinal-plants
    name: Medicinal plant identification and preparation
    domain: plants
  - id: plants.fiber-plants
    name: Fiber crop cultivation and processing
    domain: plants
  - id: plants.structural-plants
    name: Structural and timber plant harvesting
    domain: plants
  - id: plants.dye-plants
    name: Dye plant extraction for textiles and inks
    domain: plants
  - id: mining
    name: Basic mining and prospecting
    domain: mining
    metrics: 'Extract 50+ kg ore per day via surface prospecting; identify 5+ mineral types by streak test and Mohs hardness'
  - id: ceramics.pottery
    name: Pottery and kilns
    domain: ceramics
    metrics: 'Fire pottery at 900+°C in kiln; produce 20+ watertight vessels per firing cycle with <10% breakage rate'
  - id: knowledge
    name: Writing system developed
    domain: knowledge
  - id: measurement.precision-metrology
    name: Standardized basic measurements
    domain: measurement
  - id: health
    name: Sanitation and basic health practices
    domain: health
  - id: textiles
    name: Fiber crop cultivation (flax, hemp)
    domain: textiles
  - id: textiles
    name: Drop spindle spinning and hand-laid rope
    domain: textiles
  - id: mining
    name: Surface mining, prospecting, and ore identification
    domain: mining
  - id: mining
    name: Timber shoring and basic shaft mining
    domain: mining
