pathways:
  _schema_docs:
    description: 'Alternative development paths based on resource availability and geography. Each pathway prioritizes different
      sequences through the checklist tiers, reflecting how starting conditions shape the bootstrap trajectory. Items are
      referenced by checklist node ID. Not all checklist items appear in every pathway — pathways highlight the critical
      sequence for that scenario, not an exhaustive list.'
  coastal_maritime:
    name: Coastal / Maritime Pathway
    description: 'Suitable for settlements with ocean or major lake access. Exploits salt harvesting, fishing,
      shellfish (lime source), kelp (iodine/potash), drift amber (electrical properties), and water transport.
      Naval capability enables trade for missing minerals. Salt preserves food enabling longer expeditions and surplus storage.
      Seawater provides magnesium, bromine, and deuterium. Shell middens supply calcium for cement and lime.'
    advantages:
    - Salt from evaporation (food preservation, chemical feedstock)
    - Fish and shellfish protein (reduces agricultural land requirement)
    - Water transport (10-50x more efficient than overland for bulk goods)
    - Seawater minerals (NaCl, Mg, Br, D₂O)
    - Shells for lime and cement production
    - Trade access for scarce minerals via maritime routes
    challenges:
    - Limited timber in coastal scrubland
    - Storm and flood exposure
    - No native coal or iron ore on coast (requires inland trade or transport)
    - Corrosion from salt spray accelerates metal degradation
    sequence:
    - tier: tier_0_survival
      items:
      - foundations.fire
      - foundations.tools-basic
      - plants.edible-plants
      - plants.medicinal-plants
      - ceramics.pottery
      - mining
      notes: 'Prioritize salt pan construction and fish drying racks alongside basic shelter. Shell middens
        provide ready lime source for early cement and mortar.'
    - tier: tier_1_industrial
      items:
      - metals.copper-bronze
      - machine-tools.iterative-bootstrap
      - energy.steam-power
      - energy.electricity
      - chemistry.acids
      - chemistry.lubricants
      - glass.basic
      - transport.aviation
      notes: 'Water transport moves bulk ore from inland mines to coastal forges. Prioritize boat-building
        for trade routes. Salt-based Leblanc process for soda ash. Desalination brine for chlorine production.'
    - tier: tier_2_semiconductor
      items:
      - machine-tools.iterative-bootstrap
      - silicon.mg-si-production
      - silicon.crystal-growth
      - silicon.basic-devices
      - chemistry.air-separation
      notes: 'Maritime trade enables import of high-purity quartz sand for silicon. Coastal humidity
        demands robust cleanroom dehumidification. Seawater electrolysis for chlorine and hydrogen.'
  inland_continental:
    name: Inland / Continental Pathway
    description: 'Suitable for settlements in continental interiors with access to forests, mineral deposits,
      arable land, and freshwater rivers. Lacks easy trade routes but has direct access to coal, iron ore,
      limestone, clay, and timber. Agriculture and animal power dominate early stages. River systems provide
      transport corridors and water power.'
    advantages:
    - Direct access to coal, iron ore, limestone, and clay deposits
    - Abundant timber for charcoal, construction, and pit props
    - Large arable land area for grain and fiber crops
    - River systems for water power and transport
    - Mineral diversity from geological formations
    - Natural shelter from coastal storms
    challenges:
    - No salt source (requires mining or trade)
    - Limited protein without fishing (relies on livestock)
    - Overland transport 10-50x less efficient than water
    - Harsh continental winters demand robust heating and food storage
    sequence:
    - tier: tier_0_survival
      items:
      - foundations.fire
      - foundations.tools-basic
      - foundations.food-agriculture
      - plants.edible-plants
      - plants.fiber-plants
      - plants.structural-plants
      - mining
      - ceramics.pottery
      - knowledge
      notes: 'Prioritize grain agriculture and animal domestication early. Timber-frame construction
        for winter shelter. Charcoal production from abundant forests. Exploit surface iron ore deposits.'
    - tier: tier_1_industrial
      items:
      - metals.iron-steel
      - metals.copper-bronze
      - machine-tools.iterative-bootstrap
      - machine-tools.casting
      - energy.steam-power
      - energy.electricity
      - chemistry.acids
      - chemistry.lubricants
      - glass.basic
      - polymers.rubber.natural
      notes: 'Iron and coal are local — no import dependency. Water wheels power early industry before
        steam. Prioritize road and canal construction for internal transport. Forest management for
        sustainable charcoal supply.'
    - tier: tier_2_semiconductor
      items:
      - machine-tools.iterative-bootstrap
      - silicon.mg-si-production
      - silicon.crystal-growth
      - silicon.basic-devices
      - chemistry.air-separation
      - chemistry.petroleum-alternatives
      notes: 'Coal tar chemistry replaces petroleum for solvents and polymers. Local quartz deposits
        for silicon production. Inland dry climate may simplify cleanroom humidity control.
        Producer gas from wood/coal for engine fuel.'
  tropical_biomass:
    name: Tropical / Biomass-First Pathway
    description: 'Suitable for equatorial settlements with year-round growing season, abundant biomass,
      and diverse plant resources. Leverages rubber trees, bamboo, rice, sugarcane, oil palms, and
      tropical hardwoods. Biomass-first chemistry replaces mineral-dependent pathways where possible.
      Challenges include humidity control, tropical diseases, and limited coal deposits.'
    advantages:
    - Year-round growing season (multiple harvests per year)
    - Abundant biomass for fuel, chemicals, and construction
    - Natural rubber (Hevea brasiliensis) for seals and insulation
    - Rice as high-yield calorie staple (6+ tonnes/hectare)
    - Bamboo for rapid construction, scaffolding, and fiber
    - Sugarcane for ethanol (solvent, fuel, chemical feedstock)
    - Diverse plant pharmacopeia
    challenges:
    - Extreme humidity complicates metal preservation and cleanroom operation
    - Tropical diseases demand strong health infrastructure
    - Limited coal and iron ore in many tropical regions
    - Laterite soils difficult for conventional agriculture (require amendment)
    - High rainfall leaches soil nutrients rapidly
    sequence:
    - tier: tier_0_survival
      items:
      - foundations.fire
      - foundations.tools-basic
      - foundations.food-agriculture
      - plants.edible-plants
      - plants.medicinal-plants
      - plants.fiber-plants
      - plants.structural-plants
      - plants.dye-plants
      - ceramics.pottery
      - health
      notes: 'Rice paddies provide highest caloric yield per hectare. Bamboo construction for rapid
        shelter. Prioritize malaria and parasite control. Laterite soils need composting and ash amendment.'
    - tier: tier_1_industrial
      items:
      - metals.copper-bronze
      - metals.iron-steel
      - machine-tools.iterative-bootstrap
      - energy.steam-power
      - energy.electricity
      - chemistry.acids
      - chemistry.lubricants
      - polymers.rubber.natural
      - glass.basic
      notes: 'Natural rubber enables seals, gaskets, and insulation without synthetic polymer chain.
        Sugarcane ethanol as solvent and chemical feedstock. Biomass gasification replaces coal gas.
        Charcoal from abundant tropical hardwoods. Rice husk ash as silica source for glass and silicon.'
    - tier: tier_2_semiconductor
      items:
      - machine-tools.iterative-bootstrap
      - silicon.mg-si-production
      - silicon.crystal-growth
      - silicon.basic-devices
      - chemistry.air-separation
      - energy.storage
      notes: 'Rice husk ash (15-20% silica) as silicon feedstock. Aggressive dehumidification essential
        for cleanroom operation. Natural rubber gaskets for vacuum seals. Ethanol-derived ethylene for
        polyethylene production.'
